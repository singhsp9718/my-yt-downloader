<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader - Video & MP3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f9f9f9; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #333; margin-bottom: 20px; font-size: 28px; }
        
        /* Search Box */
        .search-box { display: flex; max-width: 700px; margin: 0 auto 30px auto; border: 4px solid #ff0050; border-radius: 6px; overflow: hidden; }
        .search-box input { flex: 1; padding: 15px; border: none; font-size: 16px; outline: none; }
        .search-box button { background: #ff0050; color: white; border: none; padding: 0 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .search-box button:hover { background: #d60043; }
        .search-box button:disabled { background: #ccc; cursor: not-allowed; }

        /* Result Section (Hidden initially) */
        .result-section { display: none; margin-top: 30px; display: flex; flex-wrap: wrap; text-align: left; gap: 20px; }
        .video-preview { flex: 1; min-width: 300px; }
        .video-preview img { width: 100%; border-radius: 4px; }
        .video-title { font-size: 16px; font-weight: bold; margin-top: 10px; color: #222; }

        /* Download Tabs & Table */
        .download-box { flex: 1.2; min-width: 320px; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 15px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-size: 16px; font-weight: bold; color: #666; }
        .tab-btn.active { color: #ff0050; border-bottom: 3px solid #ff0050; background: #fff5f7; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 14px; }
        th { background-color: #f5f5f5; }
        .dl-btn { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; text-align: center; }
        .dl-btn:hover { background: #218838; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .result-section { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>YouTube Video & MP3 Downloader</h1>
    
    <!-- Search Bar -->
    <div class="search-box">
        <input type="text" id="videoLink" placeholder="Yahan YouTube link paste karein...">
        <button id="startBtn" onclick="fetchVideoDetails()">Start ➔</button>
    </div>

    <!-- Result Area -->
    <div class="result-section" id="resultArea">
        <!-- Left Side: Video Details -->
        <div class="video-preview">
            <img id="thumbImg" src="" alt="Thumbnail">
            <div class="video-title" id="videoTitle">Video Title</div>
        </div>

        <!-- Right Side: Download Options -->
        <div class="download-box">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'audioTab')">🎵 Audio</button>
                <button class="tab-btn" onclick="switchTab(event, 'videoTab')">📹 Video</button>
            </div>

            <!-- Audio Tab -->
            <div id="audioTab" class="tab-content active">
                <table>
                    <thead><tr><th>File Type</th><th>Size</th><th>Action</th></tr></thead>
                    <tbody id="audioRows"></tbody>
                </table>
            </div>

            <!-- Video Tab -->
            <div id="videoTab" class="tab-content">
                <table>
                    <thead><tr><th>Resolution</th><th>Size</th><th>Action</th></tr></thead>
                    <tbody id="videoRows"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Tab switching logic (Audio/Video toggle)
    function switchTab(evt, tabName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // Backend se data fetch karne ka function
    async function fetchVideoDetails() {
        const link = document.getElementById('videoLink').value;
        if(!link) return alert("Pehle link toh dalo bhai!");

        const btn = document.getElementById('startBtn');
        btn.innerText = "Fetching...";
        btn.disabled = true;

        try {
            // Hamare Node.js server ko request bhej rha hai
            const response = await fetch('http://localhost:5000/api/fetch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: link })
            });

            const data = await response.json();

            if(data.error) {
                alert(data.error);
                return;
            }

            // Section show karo aur details bharo
            document.getElementById('resultArea').style.display = 'flex';
            document.getElementById('thumbImg').src = data.thumbnail;
            document.getElementById('videoTitle').innerText = data.title;

            let audioHtml = '';
            let videoHtml = '';

            // Video aur Audio links alag-alag split kar rhe hain
            data.formats.forEach(f => {
                if (f.vcodec === 'none' && f.acodec !== 'none') {
                    // Audio Rows
                    audioHtml += `
                        <tr>
                            <td>MP3 / Audio (${f.ext})</td>
                            <td>${f.filesize}</td>
                            <td><a href="${f.url}" target="_blank" class="dl-btn">📥 Download</a></td>
                        </tr>
                    `;
                } else if (f.vcodec !== 'none') {
                    // Video Rows
                    videoHtml += `
                        <tr>
                            <td>${f.resolution} (${f.ext})</td>
                            <td>${f.filesize}</td>
                            <td><a href="${f.url}" target="_blank" class="dl-btn">📥 Download</a></td>
                        </tr>
                    `;
                }
            });

            document.getElementById('audioRows').innerHTML = audioHtml || '<tr><td colspan="3">Audio nahi mila</td></tr>';
            document.getElementById('videoRows').innerHTML = videoHtml || '<tr><td colspan="3">Video nahi mila</td></tr>';

        } catch (error) {
            console.error(error);
            alert("Backend server se connect nahi ho paya!");
        } finally {
            btn.innerText = "Start ➔";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
